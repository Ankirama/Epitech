<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epitech C Piscine — Exercise Reference</title>
  <style>
    /* ── Catppuccin Mocha ── */
    :root {
      --base:      #1e1e2e;
      --mantle:    #181825;
      --crust:     #11111b;
      --surface0:  #313244;
      --surface1:  #45475a;
      --surface2:  #585b70;
      --overlay0:  #6c7086;
      --overlay1:  #7f849c;
      --text:      #cdd6f4;
      --subtext0:  #a6adc8;
      --subtext1:  #bac2de;
      --lavender:  #b4befe;
      --blue:      #89b4fa;
      --sapphire:  #74c7ec;
      --sky:       #89dceb;
      --teal:      #94e2d5;
      --green:     #a6e3a1;
      --yellow:    #f9e2af;
      --peach:     #fab387;
      --maroon:    #eba0ac;
      --red:       #f38ba8;
      --mauve:     #cba6f7;
      --pink:      #f5c2e7;
      --flamingo:  #f2cdcd;
      --rosewater: #f5e0dc;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--base);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      font-family: 'Courier New', 'Consolas', monospace;
      background: var(--surface0);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--sky);
    }

    /* ── Header ── */
    header {
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      color: var(--mauve);
    }
    .logo span { color: var(--text); font-weight: 400; }
    .header-meta { font-size: 12px; color: var(--subtext0); }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--mantle) 0%, var(--crust) 100%);
      border-bottom: 1px solid var(--surface0);
      padding: 40px 32px 32px;
      text-align: center;
    }
    .hero h1 { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .hero h1 em { font-style: normal; color: var(--mauve); }
    .hero p { color: var(--subtext0); font-size: 14px; margin-bottom: 20px; }
    .stats {
      display: inline-flex;
      gap: 24px;
      background: var(--surface0);
      border-radius: 12px;
      padding: 10px 24px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--blue); }
    .stat-label { font-size: 11px; color: var(--subtext0); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Tab bar ── */
    .tabs-wrapper {
      background: var(--mantle);
      border-bottom: 1px solid var(--surface0);
      padding: 0 32px;
      position: sticky;
      top: 56px;
      z-index: 9;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 2px; min-width: max-content; }
    .tab {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--subtext0);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      transition: color 0.1s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--mauve); border-bottom-color: var(--mauve); }
    .badge {
      background: var(--surface0);
      border-radius: 99px;
      padding: 1px 6px;
      font-size: 10px;
      color: var(--subtext0);
    }
    .tab.active .badge { background: var(--mauve); color: var(--crust); }
    .tab.bonus.active { color: var(--peach); border-bottom-color: var(--peach); }
    .tab.bonus.active .badge { background: var(--peach); color: var(--crust); }

    /* ── Content area ── */
    .content {
      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Day header ── */
    .day-header { margin-bottom: 20px; }
    .day-header h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .day-header p { color: var(--subtext0); font-size: 13px; }
    .tag {
      display: inline-block;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
    }
    .tag-shell { background: #fab38722; color: var(--peach); }
    .tag-c     { background: #89b4fa22; color: var(--blue); }
    .tag-mixed { background: #a6e3a122; color: var(--green); }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface0);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--mauve);
      background: var(--surface1);
      transform: translateY(-1px);
    }
    .card-name {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--sky);
      margin-bottom: 6px;
    }
    .card-name .ext { color: var(--subtext0); font-weight: 400; font-size: 11px; }
    .card-desc {
      font-size: 12px;
      color: var(--subtext1);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-proto {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--red);
      background: var(--mantle);
      border-radius: 4px;
      padding: 2px 6px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-arrow { color: var(--overlay0); font-size: 12px; }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    /* ── Modal box ── */
    .modal {
      background: var(--mantle);
      border: 1px solid var(--surface1);
      border-radius: 14px;
      width: 100%;
      max-width: min(580px, 90vw);
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--sky);
    }
    .modal-close {
      color: var(--subtext0);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface0);
      flex-shrink: 0;
    }
    .modal-close:hover { background: var(--surface1); color: var(--text); }

    /* ── Modal sections ── */
    .modal-section { margin-bottom: 16px; }
    .modal-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--overlay1);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .modal-desc { color: var(--subtext1); font-size: 13px; line-height: 1.7; }
    .modal-proto {
      background: var(--crust);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--red);
      border-left: 3px solid var(--mauve);
    }
    .modal-expected {
      background: var(--crust);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--green);
      white-space: pre;
    }

    /* ── Spoiler ── */
    .spoiler-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--yellow);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      background: var(--surface0);
      border-radius: 8px;
      border: 1px dashed var(--surface2);
      margin-bottom: 8px;
      user-select: none;
    }
    .spoiler-toggle:hover { background: var(--surface1); }
    .spoiler-code {
      background: var(--crust);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.8;
      white-space: pre;       /* preserves all indentation and line breaks */
      overflow-x: auto;       /* horizontal scroll for long lines */
      tab-size: 4;
    }
    /* Syntax highlight tokens */
    .kw { color: var(--mauve); }
    .fn { color: var(--blue); }
    .cm { color: var(--overlay1); font-style: italic; }
    .ch { color: var(--green); }
    .nb { color: var(--peach); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--surface0);
      padding: 20px 32px;
      text-align: center;
      color: var(--overlay0);
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🐱 <span>Epitech</span> C Piscine</div>
  <div class="header-meta">March 2014 · </div>
</header>

<div class="hero">
  <h1>Epitech <em>C Piscine</em> — Exercise Reference</h1>
  <p>All exercise prompts reconstructed from source code. Use tabs to navigate by day.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num">13</div><div class="stat-label">Days</div></div>
    <div class="stat"><div class="stat-num">85+</div><div class="stat-label">Exercises</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">Bonus</div></div>
  </div>
</div>

<div class="tabs-wrapper" id="tabs-wrapper">
  <div class="tabs" id="tabs">
    <!-- rendered by JS -->
  </div>
</div>

<div class="content" id="content">
  <!-- rendered by JS -->
</div>

<div class="modal-backdrop" id="modal" style="display:none" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal-box">
    <!-- populated by openModal() -->
  </div>
</div>

<footer>
  Built from source ·
  <a href="https://github.com/ankirama" target="_blank" rel="noopener">github.com/ankirama</a>
  · Epitech 2014
</footer>

<script>
// ── Exercise data ──
const DAYS = [
  // ────────────────────────────────────────────────
  // DAY 01 — Shell: Terminal Discovery
  // ────────────────────────────────────────────────
  {
    id: 'day01', label: 'Day 01', title: 'Shell: Terminal Discovery',
    description: 'Introduction to shell scripting, file system navigation and archiving.',
    lang: 'shell', bonus: false,
    exercises: [
      {
        name: 'arborescence.sh',
        description: 'Write a shell script that recursively displays the full directory tree of the current directory.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nls -R'
      },
      {
        name: 'path.sh',
        description: 'Write a shell script that displays: (1) the current absolute path, (2) the first 6 lines of a file named coffre-fort, (3) the current date and time.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\npwd\nhead -6 coffre-fort\ndate'
      },
      {
        name: 'my_tar.sh',
        description: 'Write a shell script that creates a tar.gz archive of the current directory, excluding the script itself.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\ntar -czf archive.tar.gz --exclude=my_tar.sh .'
      },
      {
        name: 'myman.sh',
        description: 'Write a shell script that simulates a manual lookup tool. Takes a command name as argument, searches for its documentation in a file named coffre-fort, and displays the result.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\ngrep -A 999 "^$1" coffre-fort | head -n 20'
      },
    ]
  },

  // ────────────────────────────────────────────────
  // DAY 02 — Shell: Process Management
  // ────────────────────────────────────────────────
  {
    id: 'day02', label: 'Day 02', title: 'Shell: Process Management',
    description: 'Shell scripting for process inspection, filtering and monitoring.',
    lang: 'shell', bonus: false,
    exercises: [
      {
        name: 'my_proc.sh',
        description: 'Write a shell script that takes a username as argument and displays only the processes belonging to that user (using ps and sed).',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nps aux | grep "^$1"'
      },
      {
        name: 'my_sort_proc.sh',
        description: "Write a shell script that displays the current user's processes sorted by descending CPU usage.",
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nps aux --sort=-%cpu | grep "^$USER"'
      },
      {
        name: 'my_not_system_proc.sh',
        description: 'Write a shell script that displays only non-system (user) processes.',
        prototype: null,
        expected: null,
        solution: "#!/bin/bash\nps aux | awk '$1 != \"root\" {print}'"
      },
      {
        name: 'other_user_proc.sh',
        description: 'Write a shell script that displays processes belonging to users other than the current user.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nps aux | awk -v user="$USER" \'$1 != user && NR > 1 {print}\''
      },
      {
        name: 'user.sh',
        description: 'Write a shell script that extracts and displays the list of unique usernames that have active processes.',
        prototype: null,
        expected: null,
        solution: "#!/bin/bash\nps aux | awk 'NR>1 {print $1}' | sort -u"
      },
      {
        name: 'my_clean_proc_name.sh',
        description: 'Write a shell script that displays the names of running processes, cleaned of their full path (binary name only).',
        prototype: null,
        expected: null,
        solution: "#!/bin/bash\nps aux | awk 'NR>1 {print $11}' | sed 's|.*/||g' | sort -u"
      },
      {
        name: 'scan_process.sh',
        description: 'Write a shell script that continuously monitors a given process and periodically displays its CPU and memory consumption.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nwhile true; do\n  ps aux | grep "$1" | grep -v grep\n  sleep 1\ndone'
      },
      {
        name: 'my_malware.sh',
        description: 'Write a shell script that extracts and displays the path of the root shell currently running from the process list.',
        prototype: null,
        expected: null,
        solution: '#!/bin/bash\nps aux | grep "^root" | awk \'{print $11}\' | grep "sh$" | head -1'
      },
    ]
  },

  // ────────────────────────────────────────────────
  // DAY 03 — C: First Display Functions
  // ────────────────────────────────────────────────
  {
    id: 'day03', label: 'Day 03', title: 'C: First Display Functions',
    description: 'All functions use only my_putchar() for output. No printf, no write.',
    lang: 'c', bonus: false,
    exercises: [
      {
        name: 'my_aff_alpha.c',
        description: 'Write a function that displays the lowercase alphabet in ascending order on a single line.',
        prototype: 'int my_aff_alpha(void);',
        expected: 'abcdefghijklmnopqrstuvwxyz',
        solution: '<span class="kw">int</span>\t<span class="fn">my_aff_alpha</span>()\n{\n  <span class="kw">char</span>\ti;\n\n  i = <span class="ch">\'a\'</span>;\n  <span class="kw">while</span> (i &lt;= <span class="ch">\'z\'</span>)\n    {\n      <span class="fn">my_putchar</span>(i);\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}'
      },
      {
        name: 'my_aff_revalpha.c',
        description: 'Write a function that displays the lowercase alphabet in descending order.',
        prototype: 'int my_aff_revalpha(void);',
        expected: 'zyxwvutsrqponmlkjihgfedcba',
        solution: '<span class="kw">int</span>\t<span class="fn">my_aff_revalpha</span>()\n{\n  <span class="kw">char</span>\ti;\n\n  i = <span class="ch">\'z\'</span>;\n  <span class="kw">while</span> (i &gt;= <span class="ch">\'a\'</span>)\n    {\n      <span class="fn">my_putchar</span>(i);\n      i -= <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}'
      },
      {
        name: 'my_aff_chiffre.c',
        description: 'Write a function that displays digits from 0 to 9 in ascending order.',
        prototype: 'int my_aff_chiffre(void);',
        expected: '0123456789',
        solution: '<span class="kw">int</span>\t<span class="fn">my_aff_chiffre</span>()\n{\n  <span class="kw">char</span>\ti;\n\n  i = <span class="ch">\'0\'</span>;\n  <span class="kw">while</span> (i &lt;= <span class="ch">\'9\'</span>)\n    {\n      <span class="fn">my_putchar</span>(i);\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}'
      },
      {
        name: 'my_isneg.c',
        description: "Write a function that prints 'N' if the integer is negative, 'P' otherwise (zero is positive).",
        prototype: 'int my_isneg(int n);',
        expected: 'my_isneg(-5)  → N\nmy_isneg(0)   → P\nmy_isneg(42)  → P',
        solution: '<span class="kw">int</span>\t<span class="fn">my_isneg</span>(<span class="kw">int</span> n)\n{\n  <span class="kw">if</span> (n &lt; <span class="nb">0</span>)\n    <span class="fn">my_putchar</span>(<span class="ch">\'N\'</span>);\n  <span class="kw">else</span>\n    <span class="fn">my_putchar</span>(<span class="ch">\'P\'</span>);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}'
      },
      {
        name: 'my_put_nbr.c',
        description: 'Write a function that displays an integer, including negative values. Only my_putchar() is allowed.',
        prototype: 'int my_put_nbr(int nbr);',
        expected: 'my_put_nbr(42)   → 42\nmy_put_nbr(-7)   → -7\nmy_put_nbr(0)    → 0',
        solution: '<span class="kw">int</span>\t<span class="fn">rec_my_put_nbr</span>(<span class="kw">int</span> nbr)\n{\n  <span class="kw">if</span> (nbr &lt;= <span class="nb">9</span>)\n    <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span> + nbr);\n  <span class="kw">else</span>\n    {\n      <span class="fn">my_put_nbr</span>(nbr / <span class="nb">10</span>);\n      <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span> + (nbr % <span class="nb">10</span>));\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">my_put_nbr</span>(<span class="kw">int</span> nbr)\n{\n  <span class="kw">if</span> (nbr &lt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n      nbr = nbr * (<span class="nb">-1</span>);\n    }\n  <span class="fn">rec_my_put_nbr</span>(nbr);\n}'
      },
      {
        name: 'my_aff_comb.c',
        description: 'Write a function that displays all combinations of 3 different digits in ascending order, separated by ", ". The last combination is not followed by ", ".',
        prototype: 'int my_aff_comb(void);',
        expected: '012, 013, 014, ..., 789',
        solution: '<span class="kw">int</span>\t<span class="fn">my_aff_comb</span>()\n{\n  <span class="kw">char</span>\ta;\n  <span class="kw">char</span>\tb;\n  <span class="kw">char</span>\tc;\n\n  a = <span class="ch">\'0\'</span>;\n  <span class="kw">while</span> (a &lt;= <span class="ch">\'7\'</span>)\n    {\n      b = <span class="ch">\'0\'</span>;\n      <span class="kw">while</span> (b &lt;= <span class="ch">\'8\'</span>)\n        {\n          c = <span class="ch">\'0\'</span>;\n          <span class="kw">while</span> (c &lt;= <span class="ch">\'9\'</span>)\n            {\n              <span class="kw">if</span> (a &lt; b &amp;&amp; b &lt; c)\n                {\n                  <span class="fn">my_putchar</span>(a);\n                  <span class="fn">my_putchar</span>(b);\n                  <span class="fn">my_putchar</span>(c);\n                  <span class="kw">if</span> (!(a == <span class="ch">\'7\'</span>))\n                    { <span class="fn">my_putchar</span>(<span class="ch">\',\'</span>); <span class="fn">my_putchar</span>(<span class="ch">\' \'</span>); }\n                }\n              c += <span class="nb">1</span>;\n            }\n          b += <span class="nb">1</span>;\n        }\n      a += <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}'
      },
      {
        name: 'my_aff_comb2.c',
        description: 'Write a function that displays all combinations of two 2-digit numbers (00 to 99) where the first is smaller than the second, separated by ", ". Format: "AA BB".',
        prototype: 'int my_aff_comb2(void);',
        expected: '00 01, 00 02, ..., 98 99',

      { name: 'my_strcapitalize.c', description: 'Write a function that capitalizes the first letter of each word (alphanumeric sequences) and lowercases the rest. Returns the modified string.', prototype: 'char *my_strcapitalize(char *str);', expected: '"hello world" → "Hello World"', solution: '<span class="cm">/*</span>\n<span class="cm">** my_strcapitalize.c for my_strcapitalize in /home/user/rendu/Piscine-C-Jour_06/ex_09</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 10 11:42:39 2014 </span>\n<span class="cm">** Last update Mon Mar 10 12:28:38 2014 </span>\n<span class="cm">*/</span>\n\n<span class="kw">char</span>\t<span class="fn">my_alphanumeric</span>(<span class="kw">int</span> i, <span class="kw">char</span> *str)\n{\n  <span class="kw">if</span> (str[i - <span class="nb">1</span>] &gt;= <span class="ch">\'a\'</span> &amp;&amp; str[i - <span class="nb">1</span>] &lt;= <span class="ch">\'z\'</span>)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">if</span> (str[i - <span class="nb">1</span>] &gt;= <span class="ch">\'A\'</span> &amp;&amp; str[i - <span class="nb">1</span>] &lt;= <span class="ch">\'Z\'</span>)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">if</span> (str[i - <span class="nb">1</span>] &gt;= <span class="ch">\'0\'</span> &amp;&amp; str[i - <span class="nb">1</span>] &lt;= <span class="ch">\'9\'</span>)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">char</span>\t*<span class="fn">my_strcapitalize</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">if</span> (str[<span class="nb">0</span>] &gt;= <span class="ch">\'a\'</span> &amp;&amp; str[<span class="nb">0</span>] &lt;= <span class="ch">\'z\'</span>)\n    str[<span class="nb">0</span>] -= <span class="nb">32</span>;\n  <span class="kw">while</span> (*(str + i) != <span class="ch">\'\0\'</span>)\n    {\n      <span class="kw">if</span> (<span class="fn">my_alphanumeric</span>(i, str))\n\t{\n\t  <span class="kw">if</span> (*(str + i) &gt;= <span class="ch">\'A\'</span> &amp;&amp; *(str + i) &lt;= <span class="ch">\'Z\'</span>)\n\t    {\n\t      <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n\t      *(str + i) += <span class="nb">32</span>;\n\t    }\n\t}\n      <span class="kw">else</span>\n\t{\n\t  <span class="kw">if</span> (*(str + i) &gt;= <span class="ch">\'a\'</span> &amp;&amp; *(str + i) &lt;= <span class="ch">\'z\'</span>)\n\t    *(str + i) -= <span class="nb">32</span>;\n\t}\n      i += <span class="nb">1</span>;\n    }\n  <span class="fn">my_putstr</span>(str);\n  <span class="kw">return</span> (str);\n}\n' },

        solution: '<span class="cm">/*</span>\n<span class="cm">** my_putnbr_base.c for my_putnbr_base in /home/user/rendu/Piscine-C-Jour_06/ex_15</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 10 14:05:01 2014 </span>\n<span class="cm">** Last update Mon Mar 10 16:17:06 2014 </span>\n<span class="cm">*/</span>\n\n<span class="kw">void</span>\t<span class="fn">my_real_function</span>(<span class="kw">int</span> nbr, <span class="kw">char</span> *base, <span class="kw">int</span> len)\n{\n  <span class="kw">if</span> (nbr / len == <span class="nb">0</span>)\n    <span class="fn">my_putchar</span>(base[nbr]);\n  <span class="kw">else</span>\n    {\n      <span class="fn">my_real_function</span>(nbr / len, base, len);\n      <span class="fn">my_putchar</span>(base[nbr % len]);\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">my_putnbr_base</span>(<span class="kw">int</span> nbr, <span class="kw">char</span> *base)\n{\n  <span class="kw">int</span>\tbase_len;\n\n  base_len = <span class="nb">0</span>;\n  <span class="kw">while</span> (base[base_len] != <span class="ch">\'\0\'</span>)\n    {\n      base_len += <span class="nb">1</span>;\n    }\n  <span class="kw">if</span> (nbr &lt; <span class="nb">0</span>)\n    <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n  <span class="fn">my_real_function</span>(nbr, base, base_len);\n}\n'

      {

        description: 'Write a function that converts a string representing a number in the given base to its integer value. Handle + and - prefixes. Return 0 for invalid input.',

        expected: 'my_getnbr_base("FF", "0123456789ABCDEF") → 255',
        solution: '<span class="cm">/*</span>\n<span class="cm">** my_getnbr_base.c for my_getnbr_base in /home/user/rendu/Piscine-C-Jour_06/ex_16</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 10 16:18:03 2014 </span>\n<span class="cm">** Last update Mon Mar 10 19:21:34 2014 </span>\n<span class="cm">*/</span>\n\n<span class="kw">char</span>\t<span class="fn">my_nbr_error</span>(<span class="kw">char</span> *nbr, <span class="kw">char</span> *base, <span class="kw">int</span> base_len)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (nbr[i] == <span class="ch">\'-\'</span> || nbr[i] == <span class="ch">\'+\'</span>)\n    i += <span class="nb">1</span>;\n  <span class="kw">while</span> (nbr[i] != <span class="ch">\'\0\'</span>)\n    {\n      <span class="kw">if</span> (base_len &gt;= <span class="nb">10</span>)\n\t{\n\t  <span class="kw">if</span> (nbr[i] &lt; <span class="ch">\'0\'</span> || nbr[i] &gt; <span class="ch">\'9\'</span> &amp;&amp; nbr[i] &gt; base[base_len - <span class="nb">1</span>])\n\t    <span class="kw">return</span> (<span class="nb">1</span>);\n\t}\n      <span class="kw">else</span>\n\t{\n\t  <span class="kw">if</span> (nbr[i] &lt; <span class="ch">\'0\'</span> || nbr[i] &gt; base[base_len - <span class="nb">1</span>])\n\t    <span class="kw">return</span> (<span class="nb">1</span>);\n\t}\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">char</span>\t<span class="fn">my_errors</span>(<span class="kw">char</span> *nbr, <span class="kw">char</span> *base)\n{\n  <span class="kw">int</span>\ti;\n  <span class="kw">int</span>   j;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">if</span> (nbr[<span class="nb">0</span>] == <span class="ch">\'\0\'</span> || base[<span class="nb">0</span>] == <span class="ch">\'\0\'</span>)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">while</span> (base[i] != <span class="ch">\'\0\'</span>)\n    {\n      j = <span class="nb">0</span>;\n      <span class="kw">while</span> (base[j] != <span class="ch">\'\0\'</span>)\n\t{\n\t  <span class="kw">if</span> (i != j)\n\t    {\n\t      <span class="kw">if</span> (base[i] == base[j])\n\t\t<span class="kw">return</span> (<span class="nb">1</span>);\n\t    }\n\t  j += <span class="nb">1</span>;\n\t}\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">return</span> (<span class="fn">my_nbr_error</span>(nbr, base, i));\n}\n\n<span class="kw">int</span>\t<span class="fn">mp</span>(<span class="kw">int</span> a, <span class="kw">int</span> e)\n{\n  <span class="kw">if</span> (e == <span class="nb">0</span>)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">else</span>\n    <span class="kw">return</span> (a * <span class="fn">mp</span>(a, e - <span class="nb">1</span>));\n}\n\n<span class="kw">int</span>\t<span class="fn">fun</span>(<span class="kw">char</span> *nbr, <span class="kw">int</span> p, <span class="kw">int</span> len)\n{\n  <span class="kw">char</span>\t*a;\n\n  <span class="kw">if</span> (p == <span class="nb">0</span>)\n    {\n      <span class="kw">if</span> (nbr[<span class="nb">0</span>] &gt;= <span class="ch">\'A\'</span> &amp;&amp; nbr[<span class="nb">0</span>] &lt;= <span class="ch">\'F\'</span>)\n\t<span class="kw">return</span> (nbr[<span class="nb">0</span>] - <span class="ch">\'A\'</span> + <span class="nb">10</span>);\n      <span class="kw">return</span> (nbr[<span class="nb">0</span>] - <span class="ch">\'0\'</span>);\n    }\n  <span class="kw">else</span>\n    {\n      a = &amp;(nbr[<span class="nb">1</span>]);\n      <span class="kw">if</span> (nbr[<span class="nb">0</span>] &gt;= <span class="ch">\'A\'</span> &amp;&amp; nbr[<span class="nb">0</ n));\n}\n'

        solution: '<span class="cm">/*</span>\n<span class="cm">** convert_base.c for convert_base in /home/user/rendu/Piscine-C-Jour_08/ex_02</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Wed Mar 12 09:28:27 2014 </span>\n<span class="cm">** Last update Wed Mar 12 22:56:03 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;stdlib.h&gt;\n\n<span class="kw">long</span>\t<span class="fn">fun</span>(<span class="kw">char</span> *nbr, <span class="kw">int</span> p, <span class="kw">int</span> l)\n{\n  <span class="kw">char</span>  *a;\n\n  <span class="kw">if</span> (p == <span class="nb">0</span>)\n    {\n      <span class="kw">if</span> (nbr[<span class="nb">0</span>] &gt;= <span class="ch">\'A\'</span> &amp;&amp; nbr[<span class="nb">0</span>] &lt;= <span class="ch">\'F\'</span>)\n        <span class="kw">return</span> (nbr[<span class="nb">0</span>] - <span class="ch">\'A\'</span> + <span class="nb">10</span>);\n      <span class="kw">return</span> (nbr[<span class="nb">0</span>] - <span class="ch">\'0\'</span>);\n    }\n  <span class="kw">else</span>\n    {\n      a = &amp;(nbr[<span class="nb">1</span>]);\n      <span class="kw">if</span> (nbr[<span class="nb">0</span>] &gt;= <span class="ch">\'A\'</span> &amp;&amp; nbr[<span class="nb">0</span>] &lt;= <span class="ch">\'F\'</span>)\n\t<span class="kw">return</span> ((nbr[<span class="nb">0</span>] - <span class="ch">\'A\'</span> + <span class="nb">10</span>) * <span class="fn">my_power_rec</span>(l, p) + <span class="fn">fun</span>(a, p - <span class="nb">1</span>, l));\n      <span class="kw">return</span> ((nbr[<span class="nb">0</span>] - <span class="ch">\'0\'</span>) * <span class="fn">my_power_rec</span>(l, p) + <span class="fn">fun</span>(&amp;(nbr[<span class="nb">1</span>]), p - <span class="nb">1</span>, l));\n    }\n}\n\n<span class="kw">long</span>     <span class="fn">my_getnbr_base</span>(<span class="kw">char</span> *str, <span class="kw">char</span> *base)\n{\n  <span class="kw">int</span>   i;\n  <span class="kw">int</span>   count;\n  <span class="kw">int</span>   power;\n  <span class="kw">int</span>   base_len;\n\n  i = <span class="nb">0</span>;\n  count = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] == <span class="ch">\'-\'</span> || str[i] == <span class="ch">\'+\'</span>)\n    {\n      <span class="kw">if</span> (str[i] == <span class="ch">\'-\'</span>)\n        count += <span class="nb">1</span>;\n      i += <span class="nb">1</span>;\n    }\n  power = <span class="nb">0</span>;\n  base_len = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[power] != <span class="ch">\'\0\'</span>)\n    power += <span class="nb">1</span>;\n  <span class="kw">while</span> (base[base_len] != <span class="ch">\'\0\'</span>)\n    base_len += <span class="nb">1</span>;\n  base_len = <span class="fn">fun</span>(&amp;(str[i]), power - <span class="nb">1</span> - i, base_len);\n  <span class="kw">return</span> (base_len = count % <span class="nb">2</span> != <span class="nb">0</span> ? base_len * -<span class="nb">1</span> : base_len);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_neg_int</span>(<span class="kw">char</span> *str, <span class="kw">long</span> *nbr, <span class="kw">char</span> *base)\n{\n  <span class="kw">int</span>\ti;\n  <span class="kw">int</span>\tj;\n\n  <span class="kw">if</span> (str[<span class="nb">0</span>] == <span class="ch">\'-\'</span>)\n    {\n      i = <span class="nb">0</span>;\n      <span class="kw">while</span> (base[i] != <span class="ch">\'\0\'</span>)\n\ti += <span class="nb">1</span>;\n      j = <span class="nb">1</span>;\n      <span class="kw">while</span> (str[j] != <span class="ch">\'\0\'</span> &amp;&amp; str[j] == base[i - <span class="nb">1</span>])\n\tj += <span class="nb">1</span>;\n      <span class="kw">if</span> (str[j] == <span class="ch">\'\0\'</span>)\n\t{\n\t  *nbr -= <span class="nb">1</span>;\n\t}\n    }\n}\n\n<span class="kw">void</span>\t<span class="fn">my_int_to_base</span>(<span class="kw">long</span> nbr, <span class="kw">char</span> *base_to, <span class="kw">char</span> *str, <span class="kw">int</span> i)\n{\n  <span class="kw">int</span>\tlen;\n\n  len = <span class="nb">0</span>;\n  <span class="kw">while</span> (base_to[len] != <span class="ch">\'\0\'</span>)\n    len += <span class="nb">1</span>;\n  <span class="kw">if</span> (nbr / len == <span class="nb">0</span>)\n    {\n      str[i] = base_to[nbr % len];\n    }\n  <span class="kw">else</span>\n    {\n      <span class="fn">my_int_to_base</span>(nbr / len, base_to, str, i + <span class="nb">1</span>);\n      str[i] = base_to[nbr % len];\n    }\n}\n\n<span class="kw">char</span>\t*<span class="fn">convert_base</span>(<span class="kw">char</span> *nbr, <span class="kw">char</span> *base_from, <span class="kw">char</span> *base_to)\n{\n  <span class="kw">long</span>\ti;\n  <span class="kw">char</span>\t*ptr;\n  <span class="kw">int</span>\tbase_len;\n\n  i = <span class="fn">my_getnbr_base</span>(nbr, base_from);\n  <span class="fn">my_neg_int</span>(nbr, &amp;i, base_from);\n  ptr = <span class="fn">malloc</span> (<span class="nb">33</span>);\n  <span class="kw">if</span> (i &lt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_int_to_base</span>(i * -<span class="nb">1</span>, base_to, ptr, <span class="nb">0</span>);\n      <span class="fn">my_revstr</span>(ptr);\n      base_len = <span class="nb">0</span>;\n      <span class="kw">while</span> (ptr[base_len] != <span class="ch">\'\0\'</span>)\n      \tbase_len += <span class="nb">1</span>;\n      <span class="kw">while</span> (base_len &gt; <span class="nb">0</span>)\n\t{\n\t  ptr[base_len] = ptr[base_len - <span class="nb">1</span>];\n\t  base_len -= <span class="nb">1</span>;\n\t}\n      ptr[<span class="nb">0</span>] = <span class="ch">\'-\'</span>;\n      <span class="kw">return</span> (ptr);\n    }\n  <span class="fn">my_int_to_base</span>(i, base_to, ptr, <span class="nb">0</span>);\n  <span class="fn">my_revstr</span>(ptr);\n  <span class="kw">return</span> (ptr);\n}\n'

 class="nb">1</span>;\n    }\n  <span class="kw">return</span> (count);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_answer</span>(<span class="kw">char</span> **arr, <span class="kw">char</span> *str, <span class="kw">int</span> i, <span class="kw">int</span> count)\n{\n  <span class="kw">int</span>\tj;\n\n  j = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="ch">\'\0\'</span> &amp;&amp; <span class="fn">my_is_alphanumeric</span>(i, str))\n    {\n      arr[count][j] = str[i];\n      i += <span class="nb">1</span>;\n      j += <span class="nb">1</span>;\n    }\n  arr[count][j] = <span class="ch">\'\0\'</span>;\n  <span class="kw">return</span> (i);\n}\n\n<span class="kw">char</span>\t**<span class="fn">my_str_to_wordtab</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">char</span>\t**arr;\n  <span class="kw">int</span>\ti;\n  <span class="kw">int</span>\tj;\n  <span class="kw">int</span>\tcount;\n\n  count = <span class="nb">0</span>;\n  i = <span class="nb">0</span>;\n  arr = <span class="fn">malloc</span>(<span class="fn">my_size_to_tab</span>(str) * <span class="fn">sizeof</span>(str));\n  <span class="kw">if</span> (arr == NULL)\n    <span class="kw">return</span> (NULL);\n  <span class="kw">while</span> (str[i] != <span class="ch">\'\0\'</span>)\n    {\n      <span class="kw">if</span> (<span class="fn">my_is_alphanumeric</span>(i, str))\n\t{\n\t  arr[count] = <span class="fn">malloc</span>(<span class="fn">sizeof</span>(*str));\n\t  i = <span class="fn">my_answer</span>(arr, str, i, count);\n \t  count += <span class="nb">1</span>;\n\t  i -= <span class="nb">1</span>;\n\t}\n      i += <span class="nb">1</span>;\n    }\n  arr[count] = <span class="nb">0</span>;\n  <span class="kw">return</span> (arr);\n}\n'

        solution: '<span class="cm">/*</span>\n<span class="cm">** my_show_tab.c for my_show_tab in /home/user/rendu/Piscine-C-Jour_09/ex_04</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Thu Mar 13 11:28:58 2014 </span>\n<span class="cm">** Last update Fri Mar 14 19:17:29 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;stdlib.h&gt;\n\n<span class="kw">long</span>    <span class="fn">rec_my_real_put_nbr</span>(<span class="kw">long</span> nbr)\n{\n  <span class="kw">if</span> (nbr &lt;= <span class="nb">9</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span> + nbr);\n    }\n  <span class="kw">else</span>\n    {\n      <span class="fn">rec_my_real_put_nbr</span>(nbr / <span class="nb">10</span>);\n      <span class="fn">my_putchar</span> (<span class="ch">\'0\'</span> + (nbr % <span class="nb">10</span>));\n    }\n}\n\n<span class="kw">int</span>     <span class="fn">my_real_put_nbr</span>(<span class="kw">int</span> nbr)\n{\n  <span class="kw">long</span>  nb;\n\n  nb = nbr;\n  <span class="kw">if</span> (nbr &lt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n      nb = nb * (-<span class="nb">1</span>);\n    }\n  <span class="fn">rec_my_real_put_nbr</span>(nb);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_real_putstr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="ch">\'\0\'</span>)\n    {\n      <span class="fn">my_putchar</span>(str[i]);\n      i += <span class="nb">1</span>;\n    }\n}\n\n<span class="kw">int</span>     <span class="fn">my_real_show_wordtab</span>(<span class="kw">char</span> **tab)\n{\n  <span class="kw">int</span>   i;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (tab[i] != <span class="nb">0</span>)\n    {\n      <span class="fn">my_real_putstr</span>(tab[i]);\n      <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n      i += <span class="nb">1</span>;\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">my_show_tab</span>(<span class="kw">struct</span> s_stock_par *par)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">if</span> (par != NULL)\n    {\n      <span class="kw">while</span> (par[i].str != <span class="nb">0</span>)\n\t{\n\t  <span class="fn">my_real_putstr</span>(par[i].str);\n\t  <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n\t  <span class="fn">my_real_put_nbr</span>(par[i].size_param);\n\t  <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n\t  <span class="fn">my_real_show_wordtab</span>(par[i].tab);\n\t  <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n\t  i += <span class="nb">1</span>;\n\t}\n    }\n}\n'

  {
    id: 'day11', label: 'Day 11', title: 'C: Function Pointers',

    exercises: [
      {
        name: 'do-op.c',
        description: 'Write a program that takes exactly 3 arguments: number1 operator number2. Perform the operation using a function pointer dispatch table and print the result. Supported operators: +, -, /, *, %. Handle division/modulo by zero with an error message.',
        prototype: null,
        expected: './do-op 10 + 5   → 15\n./do-op 10 / 0   → Stop: division by zero\n./do-op 10 & 5   → 0',
        solution: '<span class="cm">/*</span>\n<span class="cm">** do-op.c for do-op in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 09:21:43 2014 </span>\n<span class="cm">** Last update Mon Mar 24 20:48:51 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my_fun.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_nbr.h"</span>\n#<span class="kw">include</span> <span class="ch">"operations.h"</span>\n\n<span class="kw">int</span>\t<span class="fn">doop</span>(<span class="kw">int</span> nb1, <span class="kw">int</span> nb2, <span class="kw">char</span> op)\n{\n  <span class="kw">int</span>\t(*my_tab_fun[<span class="nb">5</span>])(<span class="kw">int</span>, <span class="kw">int</span>);\n  <span class="kw">int</span>\tnbr;\n\n  my_tab_fun[<span class="nb">0</span>] = my_add;\n  my_tab_fun[<span class="nb">1</span>] = my_sub;\n  my_tab_fun[<span class="nb">2</span>] = my_div;\n  my_tab_fun[<span class="nb">3</span>] = my_mul;\n  my_tab_fun[<span class="nb">4</span>] = my_mod;\n  nbr = <span class="nb">0</span>;\n  <span class="kw">if</span> (op == <span class="ch">\'+\'</span>)\n    nbr = my_tab_fun[<span class="nb">0</span>](nb1, nb2);\n  <span class="kw">else</span> <span class="kw">if</span> (op == <span class="ch">\'-\'</span>)\n    nbr = my_tab_fun[<span class="nb">1</span>](nb1, nb2);\n  <span class="kw">else</span> <span class="kw">if</span> (op == <span class="ch">\'/\'</span>)\n    nbr = my_tab_fun[<span class="nb">2</span>](nb1, nb2);\n  <span class="kw">else</span> <span class="kw">if</span> (op == <span class="ch">\'*\'</span>)\n    nbr = my_tab_fun[<span class="nb">3</span>](nb1, nb2);\n  <span class="kw">else</span>\n    nbr = my_tab_fun[<span class="nb">4</span>](nb1, nb2);\n  <span class="kw">return</span> (nbr);\n}\n\n<span class="kw">int</span>\t<span class="fn">main</span>(<span class="kw">int</span> argc, <span class="kw">char</span> **argv)\n{\n  <span class="kw">char</span>\top;\n  <span class="kw">int</span>\tnbr;\n\n  <span class="kw">if</span> (argc == <span class="nb">4</span>)\n    {\n      op = argv[<span class="nb">2</span>][<span class="nb">0</span>];\n      <span class="kw">if</span> (op != <span class="ch">\'-\'</span> &amp;&amp; op != <span class="ch">\'+\'</span> &amp;&amp; op != <span class="ch">\'/\'</span> &amp;&amp; op != <span class="ch">\'*\'</span> &amp;&amp; op != <span class="ch">\'%\'</span>)\n\t<span class="fn">my_putstr</span>(<span class="ch">"0\n"</span>);\n      <span class="kw">else</span>\n\t{\n\t  <span class="kw">if</span> (op == <span class="ch">\'/\'</span> &amp;&amp; <span class="fn">my_getnbr</span>(argv[<span class="nb">3</span>]) == <span class="nb">0</span>)\n\t    <span class="fn">my_putstr</span>(<span class="ch">"Stop: division by zero\n"</span>);\n\t  <span class="kw">else</span> <span class="kw">if</span> (op == <span class="ch">\'%\'</span> &amp;&amp; <span class="fn">my_getnbr</span>(argv[<span class="nb">3</span>]) == <span class="nb">0</span>)\n\t    <span class="fn">my_putstr</span>(<span class="ch">"Stop: modulo by zero\n"</span>);\n\t  <span class="kw">else</span>\n\t    {\n\t      nbr = <span class="fn">doop</span>(<span class="fn">my_getnbr</span>(argv[<span class="nb">1</span>]), <span class="fn">my_getnbr</span>(argv[<span class="nb">3</span>]), op);\n\t      <span class="fn">my_put_nbr</span>(nbr);\n\t      <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n\t    }\n\t}\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** my_fun.c for my_fun in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 14:55:48 2014 </span>\n<span class="cm">** Last update Mon Mar 24 16:36:04 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;unistd.h&gt;\n\n<span class="kw">void</span>\t<span class="fn">my_putchar</span>(<span class="kw">char</span> c)\n{\n  <span class="fn">write</span>(<span class="nb">1</span>, &amp;c, <span class="nb">1</span>);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_putstr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(str[i]);\n      i += <span class="nb">1</span>;\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">my_strlen</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span>)\n    i += <span class="nb">1</span>;\n  <span class="kw">return</span> (i);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** my_nbr.c for my_nbr in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 15:04:01 2014 </span>\n<span class="cm">** Last update Mon Mar 24 16:36:33 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my_fun.h"</span>\n\n<span class="kw">int</span>\t\t<span class="fn">my_bool_int</span>(<span class="kw">unsigned</span> <span class="kw">int</span> nbr, <span class="kw">char</span> bool)\n{\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tmax;\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tmin;\n\n  max = <span class="nb">2147483647</span>;\n  min = <span class="nb">2147483648</span>;\n  <span class="kw">if</span> ((nbr &gt; max &amp;&amp; bool != <span class="nb">1</span>) || (nbr &gt; min &amp;&amp; bool == <span class="nb">1</span>))\n    {\n      <span class="kw">return</span> (<span class="nb">1</span>);\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t\t<span class="fn">my_getnbr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\t\ti;\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tnbr;\n  <span class="kw">int</span>\t\tless;\n\n  less = <span class="nb">0</span>;\n  nbr = <span class="nb">0</span>;\n  i = <span class="nb">0</span>;\n  <span class="kw">if</span> (<span class="fn">my_strlen</span>(str) &gt; <span class="nb">11</span>)\n    <span class="kw">return</span> (<span class="nb">0</span>);\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span> &amp;&amp; (str[i] == <span class="ch">\'-\'</span> || str[i] == <span class="ch">\'+\'</span>))\n    {\n      <span class="kw">if</span> (str[i] == <span class="ch">\'-\'</span>)\n\tless += <span class="nb">1</span>;\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span> &amp;&amp; str[i] &gt;= <span class="ch">\'0\'</span> &amp;&amp; str[i] &lt;= <span class="ch">\'9\'</span>)\n    {\n      nbr = nbr * <span class="nb">10</span> + (*(str + i) - <span class="ch">\'0\'</span>);\n      <span class="kw">if</span> (<span class="fn">my_bool_int</span>(nbr, less % <span class="nb">2</span>) == <span class="nb">1</span>)\n\t<span class="kw">return</span> (<span class="nb">0</span>);\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">if</span> (less % <span class="nb">2</span> == <span class="nb">1</span> &amp;&amp; nbr &lt;= <span class="nb">2147483648</span>)\n    <span class="kw">return</span> (-nbr);\n  <span class="kw">return</span> (nbr);\n}\n\n<span class="kw">void</span>\t<span class="fn">rec_my_put_nbr</span>(<span class="kw">unsigned</span> <span class="kw">int</span> nbr)\n{\n   <span class="kw">if</span> (nbr &lt;= <span class="nb">9</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span> + nbr);\n    }\n  <span class="kw">else</span>\n    {\n      <span class="fn">rec_my_put_nbr</span>(nbr / <span class="nb">10</span>);\n      <span class="fn">my_putchar</span> (<span class="ch">\'0\'</span> + (nbr % <span class="nb">10</span>));\n    }\n}\n\n<span class="kw">void</span>\t<span class="fn">my_put_nbr</span>(<span class="kw">int</span> nbr)\n{\n  <span class="kw">if</span> (nbr &lt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n      <span class="fn">rec_my_put_nbr</span>(-nbr);\n    }\n  <span class="kw">else</span>\n    <span class="fn">rec_my_put_nbr</span>(nbr);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** operations.c for operations in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 09:38:12 2014 </span>\n<span class="cm">** Last update Mon Mar 24 09:38:24 2014 </span>\n<span class="cm">*/</span>\n\n<span class="kw">int</span>\t<span class="fn">my_add</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">return</span> (a + b);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_sub</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">return</span> (a - b);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_div</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">return</span> (a / b);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_mul</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">return</span> (a * b);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_mod</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">return</span> (a % b);\n}\n'

      {
        name: 'my_sort_wordtab.c',
        description: 'Write a function that sorts a NULL-terminated array of strings in ascending lexicographic order.',
        prototype: 'int my_sort_wordtab(char **tab);',
        expected: '{"c","a","b",NULL}  →  {"a","b","c",NULL}',
        solution: '<span class="kw">int</span>\t<span class="fn">my_sort_wordtab</span>(<span class="kw">char</span> **tab)\n{\n  <span class="kw">if</span> (tab != NULL)\n    <span class="fn">my_fun_sort_wordtab</span>(tab);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_fun_sort_wordtab</span>(<span class="kw">char</span> **tab)\n{\n  <span class="kw">int</span>\ti;\n  <span class="kw">char</span>\t*tmp;\n  <span class="kw">char</span>\tdone;\n\n  done = <span class="nb">1</span>;\n  <span class="kw">if</span> (tab[<span class="nb">0</span>] != <span class="nb">0</span> &amp;&amp; tab[<span class="nb">1</span>] != <span class="nb">0</span>)\n    {\n      <span class="kw">while</span> (done)\n        {\n          done = <span class="nb">0</span>;\n          i = <span class="nb">0</span>;\n          <span class="kw">while</span> (tab[i + <span class="nb">1</span>] != <span class="nb">0</span>)\n            {\n              <span class="kw">if</span> (<span class="fn">my_strcmp</span>(tab[i], tab[i + <span class="nb">1</span>]) &gt; <span class="nb">0</span>)\n                {\n                  tmp = tab[i];\n                  tab[i] = tab[i + <span class="nb">1</span>];\n                  tab[i + <span class="nb">1</span>] = tmp;\n                  done = <span class="nb">1</span>;\n                }\n              i += <span class="nb">1</span>;\n            }\n        }\n    }\n}'

 i += <span class="nb">1</span>;\n\t    }\n\t}\n    }\n}\n'

        solution: '<span class="cm">/*</span>\n<span class="cm">** do-op.c for do-op in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 09:21:43 2014 </span>\n<span class="cm">** Last update Mon Mar 24 16:27:04 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my_fun.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_nbr.h"</span>\n<span class="kw">int</span>\t<span class="fn">my_usage</span>(<span class="kw">int</span>, <span class="kw">int</span>);\n#<span class="kw">include</span> <span class="ch">"operations.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_opp.h"</span>\n\n<span class="kw">int</span>\t<span class="fn">my_own_strcmp</span>(<span class="kw">char</span> *str1, <span class="kw">char</span> *str2)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str1[i] != <span class="nb">0</span> &amp;&amp; str2[i] != <span class="nb">0</span> &amp;&amp; str1[i] == str2[i])\n    i += <span class="nb">1</span>;\n  <span class="kw">return</span> (!(str2[i] == <span class="nb">0</span> || str1[i] == <span class="nb">0</span>));\n}\n\n<span class="kw">int</span>\t<span class="fn">find_my_op</span>(<span class="kw">char</span> *op)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (i &lt; <span class="nb">5</span> &amp;&amp; <span class="fn">my_own_strcmp</span>(gl_opptab[i].str, op) != <span class="nb">0</span>)\n    i += <span class="nb">1</span>;\n  <span class="kw">return</span> (i);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_usage</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">int</span>\ti;\n\n  (<span class="kw">void</span>)a;\n  (<span class="kw">void</span>)b;\n  i = <span class="nb">0</span>;\n  <span class="fn">my_putstr</span>(<span class="ch">"error: only [ "</span>);\n  <span class="kw">while</span> (i &lt; <span class="nb">5</span>)\n    {\n      <span class="fn">my_putstr</span>(gl_opptab[i].str);\n      <span class="fn">my_putchar</span>(<span class="ch">\' \'</span>);\n      i += <span class="nb">1</span>;\n    }\n  <span class="fn">my_putstr</span>(<span class="ch">"] are supported"</span>);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">main</span>(<span class="kw">int</span> argc, <span class="kw">char</span> **argv)\n{\n  <span class="kw">int</span>\ti;\n\n  <span class="kw">if</span> (argc == <span class="nb">4</span>)\n    {\n      i = <span class="fn">find_my_op</span>(argv[<span class="nb">2</span>]);\n      gl_opptab[i].<span class="fn">fun</span>(<span class="fn">my_getnbr</span>(argv[<span class="nb">1</span>]), <span class="fn">my_getnbr</span>(argv[<span class="nb">3</span>]));\n      <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** operations.c for operations in /home/user/rendu/Piscine-C-Jour_11/do-op</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 09:38:12 2014 </span>\n<span class="cm">** Last update Mon Mar 24 16:27:42 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my_fun.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_nbr.h"</span>\n\n<span class="kw">int</span>\t<span class="fn">my_add</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="fn">my_put_nbr</span>(a + b);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_sub</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="fn">my_put_nbr</span>(a - b);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_div</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">if</span> (b == <span class="nb">0</span>)\n    <span class="fn">my_putstr</span>(<span class="ch">"Stop: division by zero"</span>);\n  <span class="kw">else</span>\n    <span class="fn">my_put_nbr</span>(a / b);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_mul</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="fn">my_put_nbr</span>(a * b);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">my_mod</span>(<span class="kw">int</span> a, <span class="kw">int</span> b)\n{\n  <span class="kw">if</span> (b == <span class="nb">0</span>)\n    <span class="fn">my_putstr</span>(<span class="ch">"Stop: modulo by zero"</span>);\n  <span class="kw">else</span>\n    <span class="fn">my_put_nbr</span>(a % b);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** my_fun.c for my_fun in /home/user/rendu/Piscine-C-Jour_11/ex_05</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 14:55:48 2014 </span>\n<span class="cm">** Last update Mon Mar 24 15:41:38 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;unistd.h&gt;\n\n<span class="kw">void</span>\t<span class="fn">my_putchar</span>(<span class="kw">char</span> c)\n{\n  <span class="fn">write</span>(<span class="nb">1</span>, &amp;c, <span class="nb">1</span>);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_putstr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(str[i]);\n      i += <span class="nb">1</span>;\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">my_strlen</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span>)\n    i += <span class="nb">1</span>;\n  <span class="kw">return</span> (i);\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** my_nbr.c for my_nbr in /home/user/rendu/Piscine-C-Jour_11/ex_05</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Mon Mar 24 15:04:01 2014 </span>\n<span class="cm">** Last update Mon Mar 24 15:11:59 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my_fun.h"</span>\n\n<span class="kw">int</span>\t\t<span class="fn">my_bool_int</span>(<span class="kw">unsigned</span> <span class="kw">int</span> nbr, <span class="kw">char</span> bool)\n{\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tmax;\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tmin;\n\n  max = <span class="nb">2147483647</span>;\n  min = <span class="nb">2147483648</span>;\n  <span class="kw">if</span> ((nbr &gt; max &amp;&amp; bool != <span class="nb">1</span>) || (nbr &gt; min &amp;&amp; bool == <span class="nb">1</span>))\n    {\n      <span class="kw">return</span> (<span class="nb">1</span>);\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t\t<span class="fn">my_getnbr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\t\ti;\n  <span class="kw">unsigned</span> <span class="kw">int</span>\tnbr;\n  <span class="kw">int</span>\t\tless;\n\n  less = <span class="nb">0</span>;\n  nbr = <span class="nb">0</span>;\n  i = <span class="nb">0</span>;\n  <span class="kw">if</span> (<span class="fn">my_strlen</span>(str) &gt; <span class="nb">11</span>)\n    <span class="kw">return</span> (<span class="nb">0</span>);\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span> &amp;&amp; (str[i] == <span class="ch">\'-\'</span> || str[i] == <span class="ch">\'+\'</span>))\n    {\n      <span class="kw">if</span> (str[i] == <span class="ch">\'-\'</span>)\n\tless += <span class="nb">1</span>;\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">while</span> (str[i] != <span class="nb">0</span> &amp;&amp; str[i] &gt;= <span class="ch">\'0\'</span> &amp;&amp; str[i] &lt;= <span class="ch">\'9\'</span>)\n    {\n      nbr = nbr * <span class="nb">10</span> + (*(str + i) - <span class="ch">\'0\'</span>);\n      <span class="kw">if</span> (<span class="fn">my_bool_int</span>(nbr, less % <span class="nb">2</span>) == <span class="nb">1</span>)\n\t<span class="kw">return</span> (<span class="nb">0</span>);\n      i += <span class="nb">1</span>;\n    }\n  <span class="kw">if</span> (less % <span class="nb">2</span> == <span class="nb">1</span> &amp;&amp; nbr &lt;= <span class="nb">2147483648</span>)\n    <span class="kw">return</span> (-nbr);\n  <span class="kw">return</span> (nbr);\n}\n\n<span class="kw">void</span>\t<span class="fn">rec_my_put_nbr</span>(<span class="kw">unsigned</span> <span class="kw">int</span> nbr)\n{\n   <span class="kw">if</span> (nbr &lt;= <span class="nb">9</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span> + nbr);\n    }\n  <span class="kw">else</span>\n    {\n      <span class="fn">rec_my_put_nbr</span>(nbr / <span class="nb">10</span>);\n      <span class="fn">my_putchar</span> (<span class="ch">\'0\'</span> + (nbr % <span class="nb">10</span>));\n    }\n}\n\n<span class="kw">void</span>\t<span class="fn">my_put_nbr</span>(<span class="kw">int</span> nbr)\n{\n  <span class="kw">if</span> (nbr &lt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n      <span class="fn">rec_my_put_nbr</span>(-nbr);\n    }\n  <span class="kw">else</span>\n    <span class="fn">rec_my_put_nbr</span>(nbr);\n}\n'

        solution: '<span class="cm">/*</span>\n<span class="cm">** my_rm_all_eq_from_list.c for day 12 in /home/user/rendu/Piscine-C-Jour_12/ex_08</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Tue Mar 25 16:23:34 2014 </span>\n<span class="cm">** Last update Tue Mar 25 18:51:37 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;stdlib.h&gt;\n#<span class="kw">include</span> <span class="ch">"mylist.h"</span>\n\nt_list\t\t*<span class="fn">my_rm_rec</span>(t_list *head, <span class="kw">void</span> *data_ref,\n\t\t\t\t       <span class="kw">int</span> (*cmp)())\n{\n  t_list\t*tmp;\n\n  <span class="kw">if</span> (head == NULL)\n    <span class="kw">return</span> (NULL);\n  <span class="kw">if</span> ((*cmp)(head-&gt;data, data_ref) == <span class="nb">0</span>)\n    {\n      tmp = head-&gt;next;\n      <span class="fn">free</span>(head);\n      tmp = <span class="fn">my_rm_rec</span>(tmp, data_ref, cmp);\n      <span class="kw">return</span> (tmp);\n    }\n  <span class="kw">else</span>\n    {\n      head-&gt;next = <span class="fn">my_rm_rec</span>(head-&gt;next, data_ref, cmp);\n      <span class="kw">return</span> (head);\n    }\n}\n\n<span class="kw">int</span>\t\t<span class="fn">my_rm_all_eq_from_list</span>(t_list **begin, <span class="kw">void</span> *data_ref,\n\t\t\t\t       <span class="kw">int</span> (*cmp)())\n{\n  t_list\t*list;\n\n  <span class="kw">if</span> (begin == NULL || (*begin) == NULL)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  <span class="kw">else</span>\n    {\n      list = <span class="fn">my_rm_rec</span>((*begin), data_ref, cmp);\n      (*begin) = list;\n    }\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n'

      {

      {
        name: 'my_sort_list.c',
        description: 'Write a function that sorts a linked list according to the comparator cmp. Returns the new list head.',
        prototype: 't_list *my_sort_list(t_list **begin, int (*cmp)(void *, void *));',
        expected: null,
        solution: '<span class="cm">/*</span>\n<span class="cm">** my_sort_list.c for day 12 in /home/user/rendu/Piscine-C-Jour_12/ex_10</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Tue Mar 25 22:50:41 2014 </span>\n<span class="cm">** Last update Tue Mar 25 22:50:44 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;stdlib.h&gt;\n#<span class="kw">include</span> <span class="ch">"mylist.h"</span>\n\n<span class="kw">int</span>\t\t<span class="fn">my_sort_list</span>(t_list **begin, <span class="kw">int</span> (*cmp)())\n{\n  t_list\t*head;\n  <span class="kw">char</span>\t\tdone;\n  <span class="kw">void</span>\t\t*tmp;\n\n  <span class="kw">if</span>(begin == NULL || (*begin) == NULL)\n    <span class="kw">return</span> (<span class="nb">1</span>);\n  done = <span class="nb">1</span>;\n  <span class="kw">while</span> (done)\n    {\n      head = (*begin);\n      done = <span class="nb">0</span>;\n      <span class="kw">while</span> (head != NULL &amp;&amp; head-&gt;next != NULL)\n\t{\n\t  <span class="kw">if</span> (<span class="fn">cmp</span>(head-&gt;data, (head-&gt;next)-&gt;data) &gt; <span class="nb">0</span>)\n\t    {\n\t      tmp = head-&gt;data;\n\t      head-&gt;data = (head-&gt;next)-&gt;data;\n\t      (head-&gt;next)-&gt;data = tmp;\n\t      done = <span class="nb">1</span>;\n\t    }\n\t  head = head-&gt;next;\n\t}\n    }\n}\n'

        solution: '<span class="cm">/*</span>\n<span class="cm">** my_put_elem_in_sort_list.c for day 12 in /home/user/rendu/Piscine-C-Jour_12/ex_11</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Tue Mar 25 22:50:21 2014 </span>\n<span class="cm">** Last update Tue Mar 25 22:50:27 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;stdlib.h&gt;\n#<span class="kw">include</span> <span class="ch">"mylist.h"</span>\n\nt_list\t\t*<span class="fn">my_rec_elem_sort</span>(t_list *head, <span class="kw">void</span> *data, <span class="kw">int</span> (*cmp)())\n{\n  t_list\t*tmp;\n\n  <span class="kw">if</span> (head == NULL || (*cmp)(head-&gt;data, data) &gt;= <span class="nb">0</span>)\n    {\n      tmp = <span class="fn">malloc</span>(<span class="fn">sizeof</span>(*tmp));\n      tmp-&gt;data = data;\n      tmp-&gt;next = head;\n      <span class="kw">return</span> (tmp);\n    }\n  <span class="kw">else</span>\n    {\n      head-&gt;next = <span class="fn">my_rec_elem_sort</span>(head-&gt;next, data, cmp);\n      <span class="kw">return</span> (head);\n    }\n}\n\n<span class="kw">int</span>\t\t<span class="fn">my_put_elem_in_sort_list</span>(t_list **begin, <span class="kw">void</span> *data,\n\t\t\t\t\t <span class="kw">int</span> (*cmp)())\n{\n  t_list\t*list;\n\n  <span class="kw">if</span> (begin == NULL)\n    begin = <span class="fn">malloc</span>(<span class="fn">sizeof</span>(*begin));\n  list = <span class="fn">my_rec_elem_sort</span>((*begin), data, cmp);\n  (*begin) = list;\n}\n'

  {

      {
        name: 'cat.c',
        description: 'Reimplement the cat command in C using only system calls. Without arguments: read from stdin and print to stdout. With arguments: print each file in order. On error, display a custom error message without using perror() or strerror().',
        prototype: null,
        expected: './cat file.txt\n./cat file1.txt file2.txt\n./cat   (reads from stdin)',
        solution: '<span class="cm">/*</span>\n<span class="cm">** cat.c for cat in /home/user/rendu/Piscine-C-Jour_13/cat</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Wed Mar 26 09:55:05 2014 </span>\n<span class="cm">** Last update Thu Mar 27 21:37:34 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;sys/types.h&gt;\n#<span class="kw">include</span> &lt;sys/stat.h&gt;\n#<span class="kw">include</span> &lt;fcntl.h&gt;\n#<span class="kw">include</span> &lt;errno.h&gt;\n#<span class="kw">include</span> <span class="ch">"my.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_perror.h"</span>\n\n<span class="kw">void</span>\t<span class="fn">my_init</span>(<span class="kw">char</span> *str, <span class="kw">int</span> len)\n{\n  <span class="kw">int</span>\ti;\n\n  i = <span class="nb">0</span>;\n  <span class="kw">while</span> (i &lt; len)\n    {\n      str[i] = <span class="nb">0</span>;\n      i += <span class="nb">1</span>;\n    }\n}\n\n<span class="kw">int</span>\t<span class="fn">read_file</span>(<span class="kw">char</span> *path)\n{\n  <span class="kw">int</span>\tfd;\n  <span class="kw">int</span>\tbytes;\n  <span class="kw">char</span>\tbuffer[<span class="nb">30000</span>];\n\n  bytes = <span class="nb">1</span>;\n  fd = <span class="fn">open</span>(path, O_RDONLY);\n  <span class="kw">if</span> (fd == -<span class="nb">1</span>)\n    {\n      <span class="fn">my_print_error</span>(errno, path);\n      <span class="kw">return</span> (<span class="nb">1</span>);\n    }\n  <span class="kw">while</span> (bytes &gt; <span class="nb">0</span>)\n    {\n      <span class="fn">my_init</span>(&amp;(buffer[<span class="nb">0</span>]), <span class="nb">30000</span>);\n      bytes = <span class="fn">read</span>(fd, buffer, <span class="nb">30000</span>);\n      <span class="kw">if</span> (bytes == -<span class="nb">1</span>)\n\t{\n\t  <span class="fn">my_print_error</span>(errno, path);\n\t  <span class="fn">close</span>(fd);\n\t  <span class="kw">return</span> (<span class="nb">1</span>);\n\t}\n      <span class="fn">my_putstr</span>(buffer);\n    }\n  <span class="fn">close</span>(fd);\n  <span class="kw">return</span> (<span class="nb">0</span>);\n}\n\n<span class="kw">int</span>\t<span class="fn">main</span>(<span class="kw">int</span> argc, <span class="kw">char</span> **argv)\n{\n  <span class="kw">int</span>\ti;\n  <span class="kw">int</span>\tcount;\n  <span class="kw">char</span>\tbuffer[<span class="nb">30000</span>];\n\n  <span class="kw">if</span> (argc == <span class="nb">1</span>)\n    {\n      count = <span class="nb">1</span>;\n      <span class="kw">while</span> (count != <span class="nb">0</span>)\n\t{\n\t  <span class="fn">my_init</span>(&amp;(buffer[<span class="nb">0</span>]), <span class="nb">30000</span>);\n\t  count = <span class="fn">read</span>(<span class="nb">0</span>, buffer, <span class="nb">30000</span>);\n\t  <span class="kw">if</span> (count == -<span class="nb">1</span>)\n\t    {\n\t      <span class="kw">return</span> (<span class="fn">my_print_error</span>(errno, <span class="ch">"cat: "</span>));\n\t    }\n\t  <span class="kw">if</span> (count &gt; <span class="nb">0</span> &amp;&amp; count &lt; <span class="nb">30000</span>)\n\t    <span class="fn">my_putstr</span> (buffer);\n\t}\n    }\n  i = <span class="nb">1</span>;\n  <span class="kw">while</span> (i &lt; argc)\n    {\n      <span class="fn">read_file</span>(argv[i]);\n      i += <span class="nb">1</span>;\n    }\n}\n\n\n<span class="cm">/*</span>\n<span class="cm">** my_perror.c for my_perror.c in /home/user/rendu/Piscine-C-Jour_13/cat</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Wed Mar 26 14:53:32 2014 </span>\n<span class="cm">** Last update Thu Mar 27 21:34:14 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> <span class="ch">"my.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_perror.h"</span>\n\n<span class="kw">int</span>\t<span class="fn">my_print_error</span>(<span class="kw">int</span> i, <span class="kw">char</span> *path)\n{\n  <span class="kw">void</span>\t(*my_fun_error[<span class="nb">7</span>])(<span class="kw">int</span>);\n  <span class="kw">int</span>\tcount;\n\n  count = <span class="nb">0</span>;\n  <span class="kw">while</span> (i &gt;= <span class="nb">22</span>)\n    {\n      count += <span class="nb">1</span>;\n      i -= <span class="nb">22</span>;\n    }\n  my_fun_error[<span class="nb">0</span>] = my_part1;\n  my_fun_error[<span class="nb">1</span>] = my_part2;\n  my_fun_error[<span class="nb">2</span>] = my_part3;\n  my_fun_error[<span class="nb">3</span>] = my_part4;\n  my_fun_error[<span class="nb">4</span>] = my_part5;\n  my_fun_error[<span class="nb">5</span>] = my_part6;\n  my_fun_error[<span class="nb">6</span>] = my_part7;\n  <span class="fn">my_putstr</span>(<span class="ch">"cat: "</span>);\n  <span class="fn">my_putstr</span>(path);\n  <span class="fn">my_putstr</span>(<span class="ch">": "</span>);\n  my_fun_error[count](i);\n  <span class="fn">my_putchar</span>(<span class="ch">\'\n\'</span>);\n  <span class="kw">return</span> (<span class="nb">1</span>);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_part1</span>(<span class="kw">int</span> i)\n{\n  <span class="kw">char</span>\t*tab[<span class="nb">23</span>];\n\n  tab[<span class="nb">0</span>] = <span class="ch">"Success"</span>;\n  tab[<span class="nb">1</span>] = <span class="ch">"Operation not permitted"</span>;\n  tab[<span class="nb">2</span>] = <span class="ch">"No such file or directory"</span>;\n  tab[<span class="nb">3</span>] = <span class="ch">"No such process"</span>;\n  tab[<span class="nb">4</span>] = <span class="ch">"Interrupted system call"</span>;\n  tab[<span class="nb">5</span>] = <span class="ch">"Input/output error"</span>;\n  tab[<span class="nb">6</span>] = <span class="ch">"No such device or address"</span>;\n  tab[<span class="nb">7</span>] = <span class="ch">"Argument list too long"</span>;\n  tab[<span class="nb">8</span>] = <span class="ch">"Exec format error"</span>;\n  tab[<span class="nb">9</span>] = <span class="ch">"Bad file descriptor"</span>;\n  tab[<span class="nb">10</span>] = <span class="ch">"No child processes"</span>;\n  tab[<span class="nb">11</span>] = <span class="ch">"Resource temporarily unavailable"</span>;\n  tab[<span class="nb">12</span>] = <span class="ch">"Cannot allocate memory"</span>;\n  tab[<span class="nb">13</span>] = <span class="ch">"Permission denied"</span>;\n  tab[<span class="nb">14</span>] = <span class="ch">"Bad address"</span>;\n  tab[<span class="nb">15</span>] = <span class="ch">"Block device required"</span>;\n  tab[<span class="nb">16</span>] = <span class="ch">"Device or resource busy"</span>;\n  tab[<span class="nb">17</span>] = <span class="ch">"File exists"</span>;\n  tab[<span class="nb">18</span>] = <span class="ch">"Invalid cross-device link"</span>;\n  tab[<span class="nb">19</span>] = <span class="ch">"No such device"</span>;\n  tab[<span class="nb">20</span>] = <span class="ch">"Not a directory"</span>;\n  tab[<span class="nb">21</span>] = <span class="ch">"Is a directory"</span>;\n  <span class="fn">my_putstr</span>(tab[i]);\n}\n\n<span class="kw">void</span>\t<span class="fn">my_part2</span>(<span class="kw">int</span> i)\n{\n  <span class="kw">char</span>\t*tab[<span class="nb">23</span>];\n\n  tab[<span class="nb">0</span>] = <span class="ch">"Invalid argument"</span>;\n  tab[<span class="nb">1</span>] = <span class="ch">"Too many open files in system"</span>;\n  tab[<span class="nb">2</span>] = <span class="ch">"Too many open files"</span>;\n  tab[<span class="nb">3</span>] = <span class="ch">"Inappropriate ioctl for devic
