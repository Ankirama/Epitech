        solution: '<span class="cm">/*</span>\n<span class="cm">** who.c for who in /home/user/rendu/Piscine-C-Jour_13/who</span>\n<span class="cm">**</span>\n<span class="cm">** Made by </span>\n<span class="cm">** Login   &lt;&gt;</span>\n<span class="cm">**</span>\n<span class="cm">** Started on  Wed Mar 26 19:20:53 2014 </span>\n<span class="cm">** Last update Thu Mar 27 11:36:57 2014 </span>\n<span class="cm">*/</span>\n\n#<span class="kw">include</span> &lt;errno.h&gt;\n#<span class="kw">include</span> &lt;utmp.h&gt;\n#<span class="kw">include</span> &lt;time.h&gt;\n#<span class="kw">include</span> &lt;sys/types.h&gt;\n#<span class="kw">include</span> &lt;fcntl.h&gt;\n#<span class="kw">include</span> <span class="ch">"my.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_perror.h"</span>\n#<span class="kw">include</span> <span class="ch">"my_print_error.h"</span>\n\n<span class="kw">void</span>\t<span class="fn">my_display_time</span>(time_t t)\n{\n  <span class="fn">my_put_nbr</span>(<span class="nb">1970</span> + t / <span class="nb">31536000</span>);\n  <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n  t = t % <span class="nb">31536000</span>;\n  <span class="kw">if</span> (t / <span class="nb">2628000</span> &lt; <span class="nb">10</span>)\n    <span class="fn">my_putchar</span>(<span class="ch">\'0\'</span>);\n  <span class="fn">my_put_nbr</span>(t / <span class="nb">2628000</span>);\n  <span class="fn">my_putchar</span>(<span class="ch">\'-\'</span>);\n  t = t % <span class="nb">604800</span>;\n  <span class="fn">my_put_nbr</span>(<span class="nb">22</span> + t / <span class="nb">86400</span>);\n  <span class="fn">my_putchar</span>(<span class="ch">\' \'</span>);\n  t = t % <span class="nb">86400</span>;\n  <span class="kw">if</span> (<span class="nb">1</span> + t / <span class="nb">3600</span> &gt;= <span class="nb">24</span>)\n    <span class="fn">my_putstr</span>(<span class="ch">"00"</span>);\n  <span class="kw">els fn">my_sub_arr</span>(arr, j - <span class="nb">1</span>, <span class="fn">my_int_to_string</span>(nbr));\n\t}\n      <span class="kw">else</span>\n\t{\n\t  nbr = <span class="fn">my_calc</span>(<span class="fn">my_getnbr</span>(arr[<span class="nb">0</span>]), <span class="fn">my_getnbr</span>(arr[<span class="nb">2</span>]), arr[<span class="nb">1</span>][<span class="nb">0</span>]);\n\t  arr = <span class="fn">my_sub_arr</span>(arr, <span class="nb">0</span>, <span class="fn">my_int_to_string</span>(nbr));\n\t}\n    }\n  <span class="kw">return</span> (arr[<span class="nb">0</span>]);\n}\n\n<span class="kw">char</span>\t*<span class="fn">what_operation</span>(<span class="kw">char</span> *str, <span class="kw">int</span> begin, <span class="kw">int</span> end, <span class="kw">char</span> parenth)\n{\n  <span class="kw">char</span>\t**arr;\n  <span class="kw">char</span>\t*my_str;\n\n  <span class="kw">if</span> (parenth)\n    arr = <span class="fn">my_str_to_wordtab</span>(<span class="fn">my_sub_string</span>(str, begin, end));\n  <span class="kw">else</span>\n    arr = <span class="fn">my_str_to_wordtab</span>(str);\n  my_str = <span class="fn">operation</span>(arr);\n  <span class="kw">if</span> (parenth)\n    <span class="kw">return</span> (<span class="fn">my_newstring</span>(str, my_str, begin, end));\n  <span class="kw">else</span>\n    <span class="kw">return</span> (my_str);\n}\n\n<span class="kw">int</span>\t<span class="fn">eval_expr</span>(<span class="kw">char</span> *str)\n{\n  <span class="kw">int</span>\ti;\n\n  str = <span class="fn">where_is_my_space</span>(str);\n  str = <span class="fn">my_str_powa</span>(str);\n  <span class="kw">if</span> (str == NULL)\n    {\n      <span class="fn">my_putstr</span>(<span class="ch">"Error: Malloc"</span>);\n      <span class="kw">return</span> (<span class="nb">0</span>);\n    }\n  <span class="kw">while</span> (<span class="fn">anyparent</span>(str))\n    {\n      i = <span class="fn">backparent</span>(st // ── Tab state ──
let activeDay = DAYS[0].id;

// ── Utility: escape HTML for safe injection ──
function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Render tabs ──
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = DAYS.map(d => `
    <div class="tab${d.bonus ? ' bonus' : ''}${d.id === activeDay ? ' active' : ''}"
         data-id="${d.id}"
         onclick="switchDay('${d.id}')">
      ${escHtml(d.label)}
      <span class="badge">${d.exercises.length}</span>
    </div>
  `).join('');
}

// ── Switch day ──
function switchDay(id) {
  activeDay = id;
  renderTabs();
  renderContent();
}

// ── Render content ──
function renderContent() {
  const day = DAYS.find(d => d.id === activeDay);
  if (!day) {
    document.getElementById('content').innerHTML =
      `<p style="color:var(--subtext0);padding:32px 0">No data for ${activeDay}.</p>`;
    return;
  }

  const tagClass = { shell: 'tag-shell', c: 'tag-c', mixed: 'tag-mixed' }[day.lang] || 'tag-c';
  const tagLabel = { shell: 'Shell', c: 'C', mixed: 'C + Shell' }[day.lang] || 'C';

  const cards = day.exercises.map((ex, i) => {
    const dotIdx = ex.name.lastIndexOf('.');
    const baseName = dotIdx > -1 ? ex.name.slice(0, dotIdx) : ex.name;
    const ext = dotIdx > -1 ? ex.name.slice(dotIdx) : '';
    const protoSnippet = ex.prototype
      ? `<span class="card-proto">${escHtml(ex.prototype)}</span>`
      : `<span class="card-proto" style="color:var(--subtext0)">shell script</span>`;
    return `
      <div class="card" onclick="openModal('${day.id}', ${i})">
        <div class="card-name">${escHtml(baseName)}<span class="ext">${escHtml(ext)}</span></div>
        <div class="card-desc">${escHtml(ex.description)}</div>
        <div class="card-footer">
          ${protoSnippet}
          <span class="card-arrow">↗</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="day-header">
      <h2>${escHtml(day.label)} — ${escHtml(day.title)}</h2>
      <p><span class="tag ${tagClass}">${tagLabel}</span>${escHtml(day.description)}</p>
    </div>
    <div class="grid">${cards}</div>
  `;
}

// ── Modal state ──
let currentExercise = null;
let spoilerOpen = false;

function openModal(dayId, exIdx) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return;
  currentExercise = day.exercises[exIdx];
  spoilerOpen = false;
  renderModal();
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  currentExercise = null;
}

function handleBackdropClick(e) {
  if (e.target.id === 'modal') closeModal();
}

function toggleSpoiler() {
  spoilerOpen = !spoilerOpen;
  renderModal();
}

function renderModal() {
  const ex = currentExercise;
  const box = document.getElementById('modal-box');
  const protoHTML = ex.prototype
    ? `<div class="modal-section">
         <div class="modal-label">Prototype</div>
         <div class="modal-proto">${escHtml(ex.prototype)}</div>
       </div>`
    : '';
  const expectedHTML = ex.expected
    ? `<div class="modal-section">
         <div class="modal-label">Expected output</div>
         <div class="modal-expected">${escHtml(ex.expected)}</div>
       </div>`
    : '';
  const spoilerHTML = ex.solution
    ? `<div class="modal-section">
         <div class="modal-label">Solution</div>
         <div class="spoiler-toggle" onclick="toggleSpoiler()">
           ${spoilerOpen ? '🙈 Hide solution' : '👁 Show solution'}
         </div>
         ${spoilerOpen
           ? `<div class="spoiler-code">${ex.solution}</div>`
           : ''}
       </div>`
    : '';

  const dotIdx = ex.name.lastIndexOf('.');
  const baseName = dotIdx > -1 ? ex.name.slice(0, dotIdx) : ex.name;
  const ext = dotIdx > -1 ? ex.name.slice(dotIdx) : '';

  box.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${escHtml(baseName)}<span style="color:var(--subtext0);font-weight:400">${escHtml(ext)}</span></div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Description</div>
      <div class="modal-desc">${escHtml(ex.description)}</div>
    </div>
    ${protoHTML}
    ${expectedHTML}
    ${spoilerHTML}
  `;
}

// ── Keyboard: Escape closes modal ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──
renderTabs();
renderContent();
</script>
